<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lâmpada — Assistente de Pregação</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0a0908;
    --bg-panel: #14120f;
    --bg-panel-raised: #1c1914;
    --gold: #c9a227;
    --gold-light: #e0c15c;
    --gold-dim: #7a642a;
    --cream: #f2ecdc;
    --muted: #948d7a;
    --line: #2a2620;
    --danger: #a8433a;
  }
  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background: var(--bg);
    color: var(--cream);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .app{
    max-width: 640px;
    margin: 0 auto;
    padding: 28px 20px 80px;
    position: relative;
  }
  /* subtle texture */
  body::before{
    content:"";
    position: fixed; inset:0;
    background:
      radial-gradient(ellipse at top, rgba(201,162,39,0.06), transparent 60%);
    pointer-events:none;
  }

  header.top{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom: 32px;
  }
  .brand{
    display:flex; align-items:center; gap:10px;
  }
  .brand .mark{
    width: 30px; height: 30px;
    display:flex; align-items:center; justify-content:center;
    border: 1px solid var(--gold-dim);
    border-radius: 50%;
    color: var(--gold);
    font-size: 15px;
    font-family: 'Cormorant Garamond', serif;
  }
  .brand h1{
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: 22px;
    letter-spacing: 0.02em;
    margin: 0;
    color: var(--cream);
  }
  .brand h1 span{ color: var(--gold); }

  button.icon-btn{
    background: none; border: 1px solid var(--line);
    color: var(--muted); border-radius: 8px;
    padding: 7px 12px; font-size: 13px;
    font-family: 'Inter', sans-serif;
    cursor: pointer; transition: all .15s ease;
  }
  button.icon-btn:hover{ border-color: var(--gold-dim); color: var(--gold-light); }

  /* progress rule */
  .progress{
    display:flex; gap: 6px; margin-bottom: 30px;
  }
  .progress .seg{
    flex:1; height: 2px; background: var(--line); border-radius: 2px;
    transition: background .3s ease;
  }
  .progress .seg.active{ background: var(--gold); }
  .progress .seg.done{ background: var(--gold-dim); }

  .eyebrow{
    font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--gold-dim); margin: 0 0 6px;
    font-weight: 600;
  }
  h2.step-title{
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600; font-size: 30px;
    margin: 0 0 26px;
    color: var(--cream);
    line-height: 1.15;
  }

  /* Type cards */
  .grid-cards{
    display:grid; grid-template-columns: 1fr 1fr; gap: 10px;
  }
  .card{
    background: var(--bg-panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 16px 14px;
    cursor: pointer;
    text-align: left;
    transition: border-color .15s ease, background .15s ease, transform .1s ease;
  }
  .card:hover{ border-color: var(--gold-dim); background: var(--bg-panel-raised); }
  .card.selected{ border-color: var(--gold); background: var(--bg-panel-raised); box-shadow: 0 0 0 1px var(--gold) inset; }
  .card .card-title{
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600; font-size: 18px;
    color: var(--cream);
    margin: 0 0 4px;
  }
  .card .card-desc{
    font-size: 12.5px; color: var(--muted); line-height: 1.4; margin:0;
  }

  .list-options{ display:flex; flex-direction:column; gap:8px; }
  .option-row{
    display:flex; align-items:center; gap: 12px;
    background: var(--bg-panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 14px 16px;
    cursor:pointer;
    transition: border-color .15s ease, background .15s ease;
  }
  .option-row:hover{ border-color: var(--gold-dim); }
  .option-row.selected{ border-color: var(--gold); background: var(--bg-panel-raised); }
  .option-row .dot{
    width: 9px; height: 9px; border-radius: 50%;
    border: 1px solid var(--gold-dim); flex-shrink:0;
  }
  .option-row.selected .dot{ background: var(--gold); border-color: var(--gold); }
  .option-row .opt-text{ font-size: 15px; color: var(--cream); }

  textarea, input[type=text]{
    width: 100%;
    background: var(--bg-panel);
    border: 1px solid var(--line);
    color: var(--cream);
    border-radius: 10px;
    padding: 14px 16px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    resize: vertical;
    min-height: 90px;
    line-height: 1.5;
  }
  textarea:focus, input[type=text]:focus{
    outline: none; border-color: var(--gold);
  }
  textarea::placeholder, input::placeholder{ color: var(--muted); }

  .btn-row{ display:flex; gap: 10px; margin-top: 14px; }
  .btn{
    font-family: 'Inter', sans-serif;
    font-weight: 600; font-size: 14px;
    border-radius: 9px; padding: 13px 20px;
    cursor: pointer; border: none;
    transition: opacity .15s ease, transform .08s ease;
  }
  .btn:active{ transform: scale(0.98); }
  .btn:disabled{ opacity: 0.4; cursor: not-allowed; }
  .btn-primary{ background: var(--gold); color: #1a1508; }
  .btn-primary:hover:not(:disabled){ background: var(--gold-light); }
  .btn-ghost{
    background: transparent; border: 1px solid var(--line); color: var(--muted);
  }
  .btn-ghost:hover:not(:disabled){ border-color: var(--gold-dim); color: var(--gold-light); }
  .btn-block{ width: 100%; }

  .footer-nav{
    display:flex; justify-content: space-between; align-items:center;
    margin-top: 28px;
  }
  .link-back{
    background:none; border:none; color: var(--muted); font-size: 13px;
    cursor:pointer; font-family:'Inter',sans-serif;
    display:flex; align-items:center; gap:6px;
  }
  .link-back:hover{ color: var(--gold-light); }

  /* Result tabs */
  .tabs{
    display:flex; gap: 4px; margin-bottom: 18px;
    border-bottom: 1px solid var(--line);
  }
  .tab{
    background:none; border:none; color: var(--muted);
    font-family:'Inter',sans-serif; font-size: 13.5px; font-weight:600;
    padding: 10px 4px; margin-right: 20px;
    cursor:pointer; position:relative;
    letter-spacing: 0.01em;
  }
  .tab.active{ color: var(--gold-light); }
  .tab.active::after{
    content:""; position:absolute; left:0; right:0; bottom:-1px; height:2px;
    background: var(--gold);
  }

  .panel{
    background: var(--bg-panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 20px;
  }
  .panel textarea{
    background: transparent; border: none; padding: 0;
    min-height: 220px; font-size: 14.5px; color: var(--cream);
    width:100%;
  }
  .panel textarea:focus{ outline:none; }

  .meta-line{
    font-size: 12px; color: var(--muted); margin-bottom: 14px;
    display:flex; gap: 8px; flex-wrap:wrap;
  }
  .tag{
    border: 1px solid var(--line); border-radius: 20px;
    padding: 3px 10px; color: var(--gold-dim);
  }

  .action-row{ display:flex; gap:10px; margin-top: 18px; flex-wrap:wrap; }

  .whatsapp-btn{
    background: #1f7a4c; color: #f2ecdc;
  }
  .whatsapp-btn:hover:not(:disabled){ background: #24925a; }

  /* loading state */
  .loading-box{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding: 60px 20px; gap: 16px; text-align:center;
  }
  .spinner{
    width: 34px; height: 34px; border-radius: 50%;
    border: 2px solid var(--line); border-top-color: var(--gold);
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin{ to{ transform: rotate(360deg); } }
  .loading-text{ color: var(--muted); font-size: 14px; font-style: italic; font-family:'Cormorant Garamond',serif; }

  /* Saved list */
  .saved-item{
    background: var(--bg-panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 10px;
    cursor:pointer;
  }
  .saved-item:hover{ border-color: var(--gold-dim); }
  .saved-item .si-top{ display:flex; justify-content:space-between; align-items:baseline; gap:10px; }
  .saved-item .si-title{
    font-family:'Cormorant Garamond',serif; font-weight:600; font-size:17px; color:var(--cream);
  }
  .saved-item .si-date{ font-size: 11px; color: var(--muted); flex-shrink:0; }
  .saved-item .si-sub{ font-size: 12.5px; color: var(--muted); margin-top:3px; }
  .empty-state{
    text-align:center; padding: 50px 20px; color: var(--muted);
  }
  .empty-state .mark-big{
    font-family:'Cormorant Garamond',serif; font-size: 34px; color: var(--gold-dim); margin-bottom: 10px;
  }

  .error-box{
    background: rgba(168,67,58,0.1); border: 1px solid var(--danger);
    color: #e0a49d; border-radius: 10px; padding: 12px 16px; font-size: 13.5px;
    margin-bottom: 16px;
  }

  .divider-verse{
    text-align:center; color: var(--gold-dim); font-family:'Cormorant Garamond',serif;
    font-size: 20px; margin: 6px 0 24px; letter-spacing: 0.3em;
  }
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
const TIPOS = [
  { id:'expositiva', nome:'Expositiva', desc:'Explica um texto verso a verso', modo:'texto' },
  { id:'textual', nome:'Textual', desc:'Desenvolve pontos a partir de um versículo', modo:'texto' },
  { id:'textual-tematica', nome:'Textual-temática', desc:'Texto base organizado por tópicos', modo:'texto' },
  { id:'narrativa', nome:'Narrativa', desc:'Conta a história bíblica com aplicação', modo:'texto' },
  { id:'tematica', nome:'Temática', desc:'Parte de um tema com vários textos', modo:'tema' },
  { id:'doutrinaria', nome:'Doutrinária', desc:'Explica uma doutrina específica', modo:'tema' },
  { id:'evangelistica', nome:'Evangelística', desc:'Apresenta o evangelho, chama à conversão', modo:'tema' },
  { id:'devocional', nome:'Devocional', desc:'Mais curta, voltada à edificação', modo:'tema' },
];

const PUBLICOS = [
  'Culto de domingo',
  'Célula / pequeno grupo',
  'Evangelismo',
  'Devocional pessoal / família',
  'Estudo bíblico',
];

let state = {
  step: 1, // 1 tipo, 2 publico, 3 texto/tema, 4 resultado
  tipo: null,
  publico: null,
  textoOuTema: '',
  loadingSugestao: false,
  loadingGeracao: false,
  resultado: null, // {esboco, pregacao, resumo}
  activeTab: 'esboco',
  error: null,
  view: 'app', // 'app' | 'salvas' | 'config'
};

function getApiKey(){
  return localStorage.getItem('lampada_api_key') || '';
}
function setApiKey(key){
  localStorage.setItem('lampada_api_key', key.trim());
}

function getSalvas(){
  try{
    return JSON.parse(localStorage.getItem('lampada_pregacoes') || '[]');
  }catch(e){ return []; }
}
function salvar(item){
  const all = getSalvas();
  all.unshift(item);
  localStorage.setItem('lampada_pregacoes', JSON.stringify(all));
}
function excluirSalva(id){
  const all = getSalvas().filter(i => i.id !== id);
  localStorage.setItem('lampada_pregacoes', JSON.stringify(all));
}

async function callClaude(userPrompt, systemPrompt){
  const key = getApiKey();
  if(!key){
    const err = new Error('SEM_CHAVE');
    err.code = 'SEM_CHAVE';
    throw err;
  }
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": key,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 1000,
      system: systemPrompt,
      messages: [{ role: "user", content: userPrompt }],
    })
  });
  if(!response.ok){
    if(response.status === 401){
      const err = new Error('CHAVE_INVALIDA');
      err.code = 'CHAVE_INVALIDA';
      throw err;
    }
    throw new Error('Falha na requisição à API');
  }
  const data = await response.json();
  return (data.content || []).map(b => b.text || '').join('\n').trim();
}

function tipoAtual(){
  return TIPOS.find(t => t.id === state.tipo);
}

async function sugerirTextoOuTema(){
  if(!state.tipo || !state.publico) return;
  if(!getApiKey()){ state.view = 'config'; render(); return; }
  state.loadingSugestao = true; state.error = null; render();
  try{
    const t = tipoAtual();
    const system = "Você é um assistente teológico reformado/calvinista. Responda apenas com o que for pedido, sem preâmbulo, sem explicações, sem aspas.";
    const prompt = `Sugira UM texto bíblico (com referência exata) OU UM tema para uma pregação com estas características:

Tipo de pregação: ${t.nome}
Público: ${state.publico}

Se o tipo pedir um texto bíblico específico, sugira uma referência (livro, capítulo e versículo(s)).
Se o tipo pedir um tema, sugira um tema teológico relevante.

Responda APENAS com o texto ou tema sugerido, em uma linha só, sem explicação.
Exemplo de resposta: "Romanos 8:28-39" ou "A soberania de Deus no sofrimento"`;
    const out = await callClaude(prompt, system);
    state.textoOuTema = out.replace(/^["']|["']$/g, '').trim();
  }catch(e){
    state.error = mensagemErro(e);
  }
  state.loadingSugestao = false; render();
}

async function gerarPregacao(){
  if(!getApiKey()){ state.view = 'config'; render(); return; }
  state.loadingGeracao = true; state.error = null; render();
  try{
    const t = tipoAtual();
    const systemCurto = "Você é um assistente para preparação de pregações, na tradição reformada/calvinista (base: Sola Scriptura, cinco pontos do calvinismo, confissões reformadas). Responda apenas com o conteúdo solicitado, sem comentários adicionais.";

    // Chamada 1: esboço + resumo (curtos, sempre cabem no limite de tokens)
    const promptCurto = `Para uma pregação com estas características:

Tipo de pregação: ${t.nome}
Texto base ou tema: ${state.textoOuTema}
Público: ${state.publico}

Gere as duas partes abaixo, EXATAMENTE neste formato:

### ESBOÇO
(Tópicos curtos e diretos, tipo guia rápido para consulta durante a pregação. Máximo 8 pontos.)

### RESUMO WHATSAPP
(Uma reflexão curta, entre 300 e 600 caracteres, linguagem acessível e calorosa, adequada para enviar como mensagem em grupo de WhatsApp. Pode incluir 1 emoji relevante no início. Termine com uma pergunta ou convite à reflexão.)`;

    // Chamada 2: pregação desenvolvida (mais longa, isolada pra não cortar o resumo)
    const promptLongo = `Para uma pregação com estas características:

Tipo de pregação: ${t.nome}
Texto base ou tema: ${state.textoOuTema}
Público: ${state.publico}

Escreva o texto desenvolvido da pregação: introdução, 2 a 3 pontos principais com explicação bíblica e aplicação prática, uma ilustração ou exemplo do cotidiano, e conclusão com chamado à ação/reflexão. Linguagem clara, fiel ao texto bíblico, sem sensacionalismo.

IMPORTANTE: o texto completo deve ter entre 450 e 600 palavras, de forma que fique completo e bem concluído dentro desse limite — não comece mais pontos do que couber terminar. Responda apenas com o texto da pregação, sem títulos extras.`;

    const [outCurto, outLongo] = await Promise.all([
      callClaude(promptCurto, systemCurto),
      callClaude(promptLongo, systemCurto),
    ]);

    const parcial = parseResultado(outCurto);
    state.resultado = {
      esboco: parcial.esboco,
      resumo: parcial.resumo,
      pregacao: outLongo.trim(),
    };
    state.activeTab = 'esboco';
    state.step = 4;
  }catch(e){
    state.error = mensagemErro(e);
  }
  state.loadingGeracao = false; render();
}

function mensagemErro(e){
  if(e && e.code === 'SEM_CHAVE') return 'Configure sua chave de API antes de gerar.';
  if(e && e.code === 'CHAVE_INVALIDA') return 'Essa chave de API não foi aceita. Confira e salve novamente.';
  return 'Não consegui completar a operação agora. Tente novamente.';
}

function parseResultado(text){
  const esbocoM = text.match(/###\s*ESBOÇO\s*([\s\S]*?)(?=###\s*PREGAÇÃO|###\s*RESUMO|$)/i);
  const pregacaoM = text.match(/###\s*PREGAÇÃO\s*([\s\S]*?)(?=###\s*RESUMO|$)/i);
  const resumoM = text.match(/###\s*RESUMO[^\n]*\n?([\s\S]*)/i);
  return {
    esboco: esbocoM ? esbocoM[1].trim() : text,
    pregacao: pregacaoM ? pregacaoM[1].trim() : '',
    resumo: resumoM ? resumoM[1].trim() : '',
  };
}

function enviarWhatsapp(texto){
  const url = 'https://wa.me/?text=' + encodeURIComponent(texto);
  window.open(url, '_blank');
}

function resetFlow(){
  state = { ...state, step:1, tipo:null, publico:null, textoOuTema:'', resultado:null, error:null, view:'app' };
  render();
}

function irParaSalvas(){
  state.view = 'salvas'; render();
}

function abrirSalva(item){
  state.tipo = item.tipo;
  state.publico = item.publico;
  state.textoOuTema = item.textoOuTema;
  state.resultado = { esboco: item.esboco, pregacao: item.pregacao, resumo: item.resumo };
  state.activeTab = 'esboco';
  state.step = 4;
  state.view = 'app';
  render();
}

function progressSegs(){
  let html = '';
  for(let i=1;i<=4;i++){
    let cls = 'seg';
    if(i < state.step) cls += ' done';
    if(i === state.step) cls += ' active';
    html += `<div class="${cls}"></div>`;
  }
  return html;
}

function render(){
  const app = document.getElementById('app');

  const header = `
    <header class="top">
      <div class="brand">
        <div class="mark">✝</div>
        <h1>L<span>â</span>mpada</h1>
      </div>
      <div style="display:flex; gap:8px;">
        <button class="icon-btn" onclick="state.view='config'; render();" title="Configurar chave de API">⚙</button>
        <button class="icon-btn" onclick="irParaSalvas()">Minhas pregações</button>
      </div>
    </header>
  `;

  if(state.view === 'salvas'){
    const salvas = getSalvas();
    let itemsHtml = '';
    if(salvas.length === 0){
      itemsHtml = `<div class="empty-state"><div class="mark-big">✝</div>Nenhuma pregação salva ainda.<br>Gere a primeira e ela aparece aqui.</div>`;
    }else{
      itemsHtml = salvas.map(i => {
        const t = TIPOS.find(x => x.id === i.tipo);
        const date = new Date(i.date).toLocaleDateString('pt-BR', {day:'2-digit', month:'short', year:'numeric'});
        return `
          <div class="saved-item" onclick='abrirSalva(${JSON.stringify(i).replace(/'/g, "&#39;")})'>
            <div class="si-top">
              <div class="si-title">${escapeHtml(i.textoOuTema)}</div>
              <div class="si-date">${date}</div>
            </div>
            <div class="si-sub">${t ? t.nome : ''} · ${escapeHtml(i.publico)}</div>
          </div>
        `;
      }).join('');
    }
    app.innerHTML = `
      ${header}
      <p class="eyebrow">Arquivo</p>
      <h2 class="step-title">Minhas pregações</h2>
      ${itemsHtml}
      <div class="footer-nav">
        <button class="link-back" onclick="state.view='app'; render();">← Voltar</button>
      </div>
    `;
    return;
  }

  if(state.view === 'config'){
    const chaveAtual = getApiKey();
    app.innerHTML = `
      ${header}
      <p class="eyebrow">Configuração</p>
      <h2 class="step-title">Sua chave de API</h2>
      <p style="color:var(--muted); font-size:14px; line-height:1.6; margin-bottom:20px;">
        Cole aqui sua chave da API da Anthropic (console.anthropic.com). Ela fica salva só neste navegador, no seu aparelho — o mesmo esquema que você já usa no DC Fit. Ninguém mais vê essa chave.
      </p>
      <input type="text" id="apiKeyInput" placeholder="sk-ant-..." value="${escapeHtml(chaveAtual)}" style="font-family: monospace; font-size: 13px;" />
      <div id="configMsg"></div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="salvarChave()">Salvar chave</button>
        ${chaveAtual ? `<button class="btn btn-ghost" onclick="removerChave()">Remover</button>` : ''}
      </div>
      <div class="footer-nav">
        <button class="link-back" onclick="state.view='app'; render();">← Voltar</button>
        <span></span>
      </div>
    `;
    return;
  }

  if(state.step === 1){
    body = `
      <p class="eyebrow">Passo 1 de 4</p>
      <h2 class="step-title">Que tipo de pregação você quer preparar?</h2>
      <div class="grid-cards">
        ${TIPOS.map(t => `
          <div class="card ${state.tipo===t.id?'selected':''}" onclick="selecionarTipo('${t.id}')">
            <p class="card-title">${t.nome}</p>
            <p class="card-desc">${t.desc}</p>
          </div>
        `).join('')}
      </div>
      <div class="footer-nav">
        <span></span>
        <button class="btn btn-primary" ${!state.tipo?'disabled':''} onclick="irPara(2)">Continuar</button>
      </div>
    `;
  }
  else if(state.step === 2){
    body = `
      <p class="eyebrow">Passo 2 de 4</p>
      <h2 class="step-title">Para qual público?</h2>
      <div class="list-options">
        ${PUBLICOS.map(p => `
          <div class="option-row ${state.publico===p?'selected':''}" onclick="selecionarPublico('${p.replace(/'/g,"\\'")}')">
            <div class="dot"></div>
            <div class="opt-text">${p}</div>
          </div>
        `).join('')}
      </div>
      <div class="footer-nav">
        <button class="link-back" onclick="irPara(1)">← Voltar</button>
        <button class="btn btn-primary" ${!state.publico?'disabled':''} onclick="irPara(3)">Continuar</button>
      </div>
    `;
  }
  else if(state.step === 3){
    const t = tipoAtual();
    const label = t.modo === 'texto' ? 'Texto bíblico' : 'Tema';
    const placeholder = t.modo === 'texto' ? 'Ex: Romanos 8:28-39' : 'Ex: A soberania de Deus no sofrimento';
    body = `
      <p class="eyebrow">Passo 3 de 4</p>
      <h2 class="step-title">${label} para a pregação</h2>
      ${state.error ? `<div class="error-box">${state.error}</div>` : ''}
      <textarea id="textoInput" placeholder="${placeholder}" oninput="onTextoInput(this.value)">${escapeHtml(state.textoOuTema)}</textarea>
      <div class="btn-row">
        <button class="btn btn-ghost" ${state.loadingSugestao?'disabled':''} onclick="sugerirTextoOuTema()">
          ${state.loadingSugestao ? 'Pensando…' : 'Não sei, sugere pra mim'}
        </button>
      </div>
      <div class="footer-nav">
        <button class="link-back" onclick="irPara(2)">← Voltar</button>
        <button id="btnGerar" class="btn btn-primary" ${!state.textoOuTema.trim()||state.loadingGeracao?'disabled':''} onclick="gerarPregacao()">
          Gerar pregação
        </button>
      </div>
    `;
  }
  else if(state.step === 4){
    if(!state.resultado){ body = ''; }
    else{
      const r = state.resultado;
      const t = tipoAtual();
      const tabContent = {
        esboco: r.esboco,
        pregacao: r.pregacao,
        resumo: r.resumo,
      }[state.activeTab];
      body = `
        <p class="eyebrow">Pronto</p>
        <h2 class="step-title">${escapeHtml(state.textoOuTema)}</h2>
        <div class="meta-line">
          <span class="tag">${t ? t.nome : ''}</span>
          <span class="tag">${escapeHtml(state.publico || '')}</span>
        </div>
        ${state.error ? `<div class="error-box">${state.error}</div>` : ''}
        <div class="tabs">
          <button class="tab ${state.activeTab==='esboco'?'active':''}" onclick="mudarTab('esboco')">Esboço</button>
          <button class="tab ${state.activeTab==='pregacao'?'active':''}" onclick="mudarTab('pregacao')">Pregação</button>
          <button class="tab ${state.activeTab==='resumo'?'active':''}" onclick="mudarTab('resumo')">Resumo WhatsApp</button>
        </div>
        <div class="panel">
          <textarea id="resultTextarea" oninput="atualizarCampoAtivo(this.value)">${escapeHtml(tabContent || '')}</textarea>
        </div>
        <div class="action-row">
          ${state.activeTab === 'resumo' ? `<button class="btn whatsapp-btn" onclick="enviarWhatsapp(state.resultado.resumo)">Enviar por WhatsApp</button>` : ''}
          <button class="btn btn-ghost" onclick="salvarAtual()">Salvar</button>
          <button class="btn btn-ghost" onclick="gerarPregacao()">Gerar de novo</button>
        </div>
        <div class="footer-nav">
          <button class="link-back" onclick="resetFlow()">← Nova pregação</button>
          <span></span>
        </div>
      `;
    }
  }

  const loading = (state.loadingGeracao) ? `
    <div class="loading-box">
      <div class="spinner"></div>
      <div class="loading-text">Preparando a pregação…</div>
    </div>
  ` : '';

  app.innerHTML = `
    ${header}
    <div class="progress">${progressSegs()}</div>
    ${state.loadingGeracao ? loading : body}
  `;
}

function escapeHtml(str){
  if(!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function selecionarTipo(id){ state.tipo = id; render(); }
function selecionarPublico(p){ state.publico = p; render(); }
function irPara(step){ state.step = step; state.error = null; render(); }
function mudarTab(tab){ state.activeTab = tab; render(); }

function onTextoInput(val){
  state.textoOuTema = val;
  const btn = document.getElementById('btnGerar');
  if(btn){ btn.disabled = !val.trim() || state.loadingGeracao; }
}

function salvarChave(){
  const input = document.getElementById('apiKeyInput');
  const val = input.value.trim();
  if(!val){
    document.getElementById('configMsg').innerHTML = `<div class="error-box">Cole uma chave válida antes de salvar.</div>`;
    return;
  }
  setApiKey(val);
  document.getElementById('configMsg').innerHTML = `<p style="color:var(--gold-light); font-size:13px; margin-top:10px;">Chave salva ✓</p>`;
}

function removerChave(){
  localStorage.removeItem('lampada_api_key');
  render();
}

function atualizarCampoAtivo(val){
  if(!state.resultado) return;
  state.resultado[state.activeTab] = val;
}

function salvarAtual(){
  if(!state.resultado) return;
  salvar({
    id: Date.now().toString(),
    date: Date.now(),
    tipo: state.tipo,
    publico: state.publico,
    textoOuTema: state.textoOuTema,
    esboco: state.resultado.esboco,
    pregacao: state.resultado.pregacao,
    resumo: state.resultado.resumo,
  });
  const btn = event.target;
  const original = btn.textContent;
  btn.textContent = 'Salvo ✓';
  setTimeout(() => { btn.textContent = original; }, 1500);
}

render();
</script>
</body>
</html>
